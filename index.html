<!DOCTYPE html>
<html>
<head>
    <title>Simple App</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background-color: #f0f0f0;
        }
        nav button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        .page {
            display: none;
        }
        .active {
            display: block;
        }
        input, textarea {
            padding: 8px;
            margin: 5px;
            width: 220px;
        }
    </style>
</head>
<body>

    <h1>My App</h1>

    <!-- Navigation -->
    <nav>
        <button onclick="showPage('home')">Home</button>
        <button onclick="showPage('contact')">Contact</button>
    </nav>

    <!-- Home Page -->
    <div id="home" class="page active">
        <h2>Welcome</h2>
        <p id="text">Click the button</p>
        <button onclick="changeText()">Click Me</button>
    </div>

    <!-- Contact Page -->
    <div id="contact" class="page">
        <h2>Contact Us</h2>
        <form onsubmit="submitForm(event)">
            <br>
            <input type="text" placeholder="Your Name" required><br>
            <input type="email" placeholder="Your Email" required><br>
            <textarea placeholder="Your Message" required></textarea><br>
            <button type="submit">Send</button>
        </form>
        <p id="msg"></p>
    </div>

    <script>
        function changeText() {
            document.getElementById("text").innerHTML = "Hello! You clicked the button!";
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => {
                p.classList.remove('active');
            });
            document.getElementById(pageId).classList.add('active');
        }

        function submitForm(event) {
            event.preventDefault();
            document.getElementById("msg").innerHTML = "Message sent successfully!";
        }
    </script>

</body>
</html>
