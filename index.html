<!DOCTYPE html>
<html>
<head>
    <title>Simple One Page App</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
            background-color: #f0f0f0;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h1>Welcome</h1>
    <p id="text">Click the button</p>
    <button onclick="changeText()">Click Me</button>

    <script>
        function changeText() {
            document.getElementById("text").innerHTML = "Hello! You clicked the button!";
        }
    </script>

</body>
</html>
